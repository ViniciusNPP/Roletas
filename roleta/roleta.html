<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roleta</title>
  <link rel="icon" href="img\roleta2.png" type="image/x-icon">
  <link rel="stylesheet" href="roleta.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <aside class="menu-roleta-container">

      <ul class="menu-lista">
        <p class="configurações botoes-menu" id="configurações">☰</p>
        <p class="lista botoes-menu" id="item-lista">←</p>
      </ul>
    </aside>

  </header>
  <div class="conteudo-container">

    <div class="configuracao-container menu">
      <p>OI</p>
    </div>

    <div class="roleta-container">
      <canvas class="botao-roleta" width="100" height="130"></canvas>
    </div>

    <div class="items-container menu">
      <div class="itens-roleta" id="itens-roleta">
        <!-- <div class="item" id="item">
          
          <div id="cor-preview" class="cor-preview"></div>
          <input id="nome-item" class="nome-item" autocomplete="off"></input>
          <input id="chance-item" class="chance" maxlength="3" autocomplete="off">
          <img class="excluir-item" id="excluir-item" src="../img/Trash.png"></img>
          
        </div> -->
      </div>
      <button class="adicionar-item" id="adicionar-item">+</button>
    </div>

  </div>
  <div class="color-picker" id="color-picker">
    <div class="container-selector-color">

      <div id="container-color-picker" class="color-picker-container"></div>
      <div class="container-input-color input-color" id="container-input-rgb">
        <span class="label-rgb">R</span><input type="text" autocomplete="off" id="input-rgb-red" class="input-rgb">
        <span class="label-rgb">G</span><input type="text" autocomplete="off" id="input-rgb-green" class="input-rgb">
        <span class="label-rgb">B</span><input type="text" autocomplete="off" id="input-rgb-blue" class="input-rgb">
      </div>

      <div class="container-input-hex input-color" id="container-input-hex">
        <span class="label-hex">Hex</span><input type="text" autocomplete="off" class="input-hex" id="input-hex">
      </div>

      <button id="change-color-model-button" style="display: none"></button>
      <label for="change-color-model-button" class="changel-color-model">↻ Trocar Modelo</label>

    </div>
    <div class="container-button">
      <button class="button-cancel-color button-color-picker" id="button-cancel-color">Cancelar</button>
      <button class="button-save-color button-color-picker" id="button-save-color">Salvar</button>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <script type="module" src="main.js"></script>
  <script src="canvas/botao-roleta.js"></script>
</body>

</html>
